version: "3.9"

# Reproducible research infrastructure for EIBench.
# All images are pinned to exact versions.
# Run: docker compose up -d

services:

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: eiger-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.2.8
    container_name: eiger-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull models after container starts:
    # docker exec eiger-ollama ollama pull llama3.1:8b
    # docker exec eiger-ollama ollama pull mistral:7b

volumes:
  qdrant_storage:
  ollama_data:
